<!--            
    CSS
            max-w-7xl - estica essa div o quanto quiser, mas quando ela chega a 1280px de largura, não cresça mais do que isso.
                w-full - em telas menores, como celular, ela ocupe 100% do espaço disponível).  
                Grid - ativa o CSS Grid Layout no Tailwind. Ela transforma o elemento em um "container grelha", permitindo que você 
                      divida o espaço em linhas e colunas invisíveis para organizar os elementos de forma extremamente precisa.
                  grid-cols-1 - Uma única coluna (muito usado para celulares, onde tudo fica empilhado).
                  gap - controla a distância (o "respiro") entre as linhas e colunas da sua grelha.
                   gap-4 - cria um espaço de 16px entre todos os itens do grid.
                   gap-x-4 - cria espaço apenas na horizontal (entre colunas).
                   gap-y-8 - cria espaço apenas na vertical (entre linhas).
                    gap-12 md:gap-8 - No celular, deixa um espaço grande de 48px (gap-12) entre o texto e a imagem para não embolar. 
                                No computador, o espaço entre as duas colunas passa a ser de 32px (gap-8).
             text-base (Celular)- tamanho do texto para 16px
             sm:text-lg (Tablet/PC) - tamanho do texto para 18px  
             text-lg (Celular) - tamanho do texto para 18px   
             sm:text-xl (Tablet/PC) - tamanho do texto para 20px   
             
             
    HOSPEDAGEM DO SITE
    Com o terminal aberto no VS conde

    # 1. Inicializa o Git na pasta do seu projeto
    git init

    # 2. Adiciona todos os seus arquivos para o próximo "envio"
    git add .

    # 3. Salva o estado atual dos arquivos com uma mensagem explicativa
    git commit -m "Primeiro commit do meu site"

    # 4. Renomeia a branch principal para 'main' (padrão do GitHub)
    git branch -M main

    # 5. git remote add origin https://github.com/josenilsonrv/meu-site.git
        liga o repositório com os arquivos do PC

    Push
        git add .
        git commit -m "texto ou melhoria que você fez"
        git push
        
            Dica: 
                Não precisa fazer isso a cada 
                linha de código que escreve. Escreva um 
                bloco de código, teste no seu computador, 
                e quando sentir que aquela alteração ficou 
                boa e concluída, faça esse trio de comandos 
                para atualizar seu site na internet!
